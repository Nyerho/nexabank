<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaBank Admin Portal</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link href="css/styles.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo"><i class="bi bi-bank2 me-2"></i>Nexa<span>Bank</span> <span class="admin-badge">Admin</span></div>
      </div>
      <div class="sidebar-user">
        <div class="d-flex align-items-center gap-3">
          <div class="sidebar-avatar" id="sidebar-avatar">A</div>
          <div>
            <div style="font-weight:600;font-size:.9rem;" id="sidebar-name">Admin User</div>
            <div style="font-size:.7rem;opacity:.7;" id="sidebar-role">Administrator</div>
          </div>
        </div>
      </div>
      <nav>
        <div class="nav-section">Management</div>
        <div class="nav-item active" data-page="admin-dashboard" onclick="navigate('admin-dashboard')"><i class="bi bi-grid"></i> Dashboard</div>
        <div class="nav-item" data-page="admin-users" onclick="navigate('admin-users')"><i class="bi bi-people"></i> Users</div>
        <div class="nav-item" data-page="admin-accounts" onclick="navigate('admin-accounts')"><i class="bi bi-wallet2"></i> Accounts</div>
        <div class="nav-item" data-page="admin-transactions" onclick="navigate('admin-transactions')"><i class="bi bi-arrow-down-up"></i> Transactions</div>
        <div class="nav-item" data-page="admin-loans" onclick="navigate('admin-loans')"><i class="bi bi-cash-stack"></i> Loans</div>
        <div class="nav-item" data-page="admin-cards" onclick="navigate('admin-cards')"><i class="bi bi-credit-card"></i> Cards</div>
        
        <div class="nav-section">System</div>
        <div class="nav-item" data-page="admin-reports" onclick="navigate('admin-reports')"><i class="bi bi-bar-chart"></i> Reports</div>
        <div class="nav-item" data-page="admin-audit" onclick="navigate('admin-audit')"><i class="bi bi-shield-check"></i> Audit Log</div>
        <div class="nav-item" data-page="admin-config" onclick="navigate('admin-config')"><i class="bi bi-gear"></i> Configuration</div>
        
        <div style="margin-top:auto;padding-top:1rem;border-top:1px solid rgba(255,255,255,.1);">
          <div class="nav-item" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Sign Out</div>
        </div>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="btn-nb btn-nb-outline d-lg-none" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="bi bi-list"></i></button>
          <div class="topbar-title">Admin Portal</div>
        </div>
        <div class="d-flex align-items-center gap-3">
          <button class="icon-btn" onclick="toggleTheme()" id="theme-btn"><i class="bi bi-sun"></i></button>
          <div class="sidebar-avatar" id="topbar-avatar" style="width:32px;height:32px;font-size:.8rem;">A</div>
        </div>
      </div>

      <div class="page-content" id="admin-content">
        <!-- Content injected by JS -->
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>
  
  <!-- Modal Overlay -->
  <div class="nb-modal-overlay" id="modal-overlay" style="display:none;">
    <div class="nb-modal" id="modal-box">
      <div class="nb-modal-header">
        <div class="nb-modal-title" id="modal-title">Modal Title</div>
        <button class="nb-modal-close" onclick="closeModal()"><i class="bi bi-x-lg"></i></button>
      </div>
      <div id="modal-body"></div>
      <div class="mt-4" id="modal-footer"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/state.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script>
    // Boot Admin
    document.addEventListener('DOMContentLoaded', () => {
      // Check theme
      const savedTheme = localStorage.getItem('nb_theme') || 'light';
      document.documentElement.dataset.theme = savedTheme;
      const themeBtn = document.getElementById('theme-btn');
      if(themeBtn) themeBtn.innerHTML = savedTheme==='dark' ? '<i class="bi bi-moon"></i>' : '<i class="bi bi-sun"></i>';

      // Check Session
      if (!restoreSession() || !isAdmin()) {
        location.href = 'app.html';
      } else {
        const u = STATE.user;
        document.getElementById('sidebar-name').textContent = u.name;
        document.getElementById('sidebar-role').textContent = u.role.toUpperCase();
        document.getElementById('sidebar-avatar').textContent = u.name.charAt(0);
        document.getElementById('topbar-avatar').textContent = u.name.charAt(0);
        
        // Initial Render
        navigate('admin-dashboard');
      }
    });

    function toggleTheme() {
      const html = document.documentElement;
      const dark = html.dataset.theme === 'dark';
      html.dataset.theme = dark ? 'light' : 'dark';
      document.getElementById('theme-btn').innerHTML = dark ? '<i class="bi bi-moon"></i>' : '<i class="bi bi-sun"></i>';
      localStorage.setItem('nb_theme', html.dataset.theme);
    }
  </script>
</body>
</html>
