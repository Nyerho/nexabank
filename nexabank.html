<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaBank — Online Banking</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --nb-primary: #0f2d52;
      --nb-accent: #1d6fa4;
      --nb-light-accent: #e8f1fb;
      --nb-gold: #c9a84c;
      --nb-success: #12b76a;
      --nb-danger: #f04438;
      --nb-warning: #f79009;
      --nb-bg: #f3f6fb;
      --nb-card: #ffffff;
      --nb-text: #1a1f36;
      --nb-muted: #6b7280;
      --nb-border: #e5e9f0;
      --nb-sidebar-w: 260px;
      --nb-sidebar-bg: #0f2d52;
      --nb-sidebar-text: rgba(255,255,255,0.85);
    }
    [data-theme="dark"] {
      --nb-bg: #0d1117;
      --nb-card: #161b22;
      --nb-text: #e6edf3;
      --nb-muted: #8b949e;
      --nb-border: #30363d;
      --nb-light-accent: #1c2e45;
      --nb-sidebar-bg: #010409;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--nb-bg); color: var(--nb-text); margin: 0; transition: background .3s, color .3s; }
    a { text-decoration: none; color: inherit; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ===== AUTH ===== */
    #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f2d52 0%, #1d6fa4 60%, #0a1f38 100%); position: relative; overflow: hidden; }
    #auth-screen::before { content:''; position:absolute; width:600px; height:600px; border-radius:50%; background:rgba(255,255,255,.04); top:-200px; right:-200px; }
    #auth-screen::after { content:''; position:absolute; width:400px; height:400px; border-radius:50%; background:rgba(255,255,255,.03); bottom:-150px; left:-100px; }
    .auth-card { background: rgba(255,255,255,.97); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 25px 60px rgba(0,0,0,.3); position: relative; z-index: 1; }
    [data-theme="dark"] .auth-card { background: #161b22; }
    .auth-logo { font-size: 2rem; font-weight: 700; color: var(--nb-primary); letter-spacing: -1px; }
    .auth-logo span { color: var(--nb-gold); }
    .nb-input { border: 1.5px solid var(--nb-border); border-radius: 10px; padding: .65rem 1rem; background: var(--nb-bg); color: var(--nb-text); width: 100%; font-family: inherit; font-size: .9rem; transition: border-color .2s; outline: none; }
    .nb-input:focus { border-color: var(--nb-accent); box-shadow: 0 0 0 3px rgba(29,111,164,.15); }
    [data-theme="dark"] .nb-input { background: #0d1117; }

    /* ===== LAYOUT ===== */
    #app { display: flex; min-height: 100vh; }
    .sidebar { width: var(--nb-sidebar-w); background: var(--nb-sidebar-bg); color: var(--nb-sidebar-text); position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 1000; display: flex; flex-direction: column; transition: transform .3s; }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar-logo { font-size: 1.4rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .sidebar-logo span { color: var(--nb-gold); }
    .sidebar-user { padding: 1rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--nb-gold); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .9rem; color: var(--nb-primary); }
    .sidebar nav { flex: 1; padding: .75rem 0; }
    .nav-section { padding: .25rem 1.5rem; font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,.4); margin-top: .5rem; }
    .nav-item { display: flex; align-items: center; gap: .75rem; padding: .65rem 1.5rem; font-size: .88rem; color: var(--nb-sidebar-text); cursor: pointer; transition: all .2s; border-left: 3px solid transparent; }
    .nav-item:hover { background: rgba(255,255,255,.07); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,.12); color: #fff; border-left-color: var(--nb-gold); font-weight: 600; }
    .nav-item i { font-size: 1.05rem; width: 20px; }
    .admin-badge { background: var(--nb-gold); color: var(--nb-primary); font-size: .6rem; font-weight: 700; padding: 1px 6px; border-radius: 20px; text-transform: uppercase; margin-left: auto; }
    .main-content { margin-left: var(--nb-sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: var(--nb-card); border-bottom: 1px solid var(--nb-border); padding: .75rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-title { font-size: 1.1rem; font-weight: 600; }
    .page-content { padding: 2rem; flex: 1; }
    @media (max-width: 992px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .topbar { padding: .75rem 1rem; }
      .page-content { padding: 1rem; }
    }

    /* ===== CARDS ===== */
    .nb-card { background: var(--nb-card); border: 1px solid var(--nb-border); border-radius: 14px; padding: 1.5rem; transition: box-shadow .2s; }
    .nb-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .stat-card { background: linear-gradient(135deg, var(--nb-primary), var(--nb-accent)); color: #fff; border-radius: 14px; padding: 1.5rem; }
    .stat-card.gold { background: linear-gradient(135deg, #7c5a1e, var(--nb-gold)); }
    .stat-card.green { background: linear-gradient(135deg, #064e3b, var(--nb-success)); }
    .stat-card.red { background: linear-gradient(135deg, #7f1d1d, var(--nb-danger)); }
    .stat-value { font-size: 1.8rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .stat-label { font-size: .8rem; opacity: .8; margin-top: .25rem; }

    /* ===== BANK CARD ===== */
    .bank-card { border-radius: 16px; padding: 1.5rem; color: #fff; position: relative; overflow: hidden; min-height: 180px; cursor: pointer; transition: transform .2s; }
    .bank-card:hover { transform: translateY(-3px); }
    .bank-card.blue { background: linear-gradient(135deg, #0f2d52, #1d6fa4); }
    .bank-card.dark { background: linear-gradient(135deg, #1a1a2e, #16213e); }
    .bank-card.gold { background: linear-gradient(135deg, #7c5a1e, #c9a84c); }
    .bank-card::after { content:''; position:absolute; width:250px; height:250px; border-radius:50%; background:rgba(255,255,255,.06); bottom:-80px; right:-80px; }
    .bank-card::before { content:''; position:absolute; width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,.04); top:-50px; left:50px; }
    .card-chip { width: 40px; height: 30px; border-radius: 5px; background: var(--nb-gold); margin-bottom: 1rem; }
    .card-number { font-family: 'JetBrains Mono', monospace; font-size: .95rem; letter-spacing: 2px; }
    .card-name { font-size: .75rem; opacity: .8; text-transform: uppercase; letter-spacing: 1px; }

    /* ===== TABLE ===== */
    .nb-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .nb-table th { background: var(--nb-bg); padding: .75rem 1rem; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--nb-muted); border-bottom: 2px solid var(--nb-border); }
    .nb-table td { padding: .75rem 1rem; font-size: .88rem; border-bottom: 1px solid var(--nb-border); vertical-align: middle; }
    .nb-table tr:last-child td { border-bottom: none; }
    .nb-table tbody tr:hover td { background: var(--nb-light-accent); }
    .nb-table .amount-pos { color: var(--nb-success); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .nb-table .amount-neg { color: var(--nb-danger); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

    /* ===== BADGES ===== */
    .badge-status { padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600; display: inline-block; }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-frozen { background: #dbeafe; color: #1e40af; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-closed { background: #fee2e2; color: #991b1b; }
    [data-theme="dark"] .badge-active { background: #064e3b; color: #6ee7b7; }
    [data-theme="dark"] .badge-frozen { background: #1e3a5f; color: #93c5fd; }
    [data-theme="dark"] .badge-pending { background: #451a03; color: #fbbf24; }

    /* ===== BUTTONS ===== */
    .btn-nb { padding: .55rem 1.2rem; border-radius: 10px; font-size: .88rem; font-weight: 500; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: .4rem; transition: all .2s; font-family: inherit; }
    .btn-nb-primary { background: var(--nb-accent); color: #fff; }
    .btn-nb-primary:hover { background: var(--nb-primary); }
    .btn-nb-outline { background: transparent; border: 1.5px solid var(--nb-border); color: var(--nb-text); }
    .btn-nb-outline:hover { border-color: var(--nb-accent); color: var(--nb-accent); }
    .btn-nb-danger { background: var(--nb-danger); color: #fff; }
    .btn-nb-success { background: var(--nb-success); color: #fff; }
    .btn-nb-gold { background: var(--nb-gold); color: var(--nb-primary); }
    .btn-nb-sm { padding: .3rem .7rem; font-size: .78rem; }

    /* ===== MODAL ===== */
    .nb-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 9998; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .nb-modal { background: var(--nb-card); border-radius: 16px; padding: 2rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; position: relative; z-index: 9999; animation: modalIn .2s ease; }
    @keyframes modalIn { from { opacity:0; transform: scale(.95) translateY(10px); } to { opacity:1; transform: scale(1) translateY(0); } }
    .nb-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .nb-modal-title { font-size: 1.1rem; font-weight: 700; }
    .nb-modal-close { background: var(--nb-bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--nb-muted); font-size: 1rem; }
    .nb-modal-close:hover { background: var(--nb-border); }

    /* ===== TOAST ===== */
    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 99999; display: flex; flex-direction: column; gap: .5rem; }
    .toast-item { background: var(--nb-card); border-radius: 12px; padding: .75rem 1.2rem; box-shadow: 0 8px 25px rgba(0,0,0,.15); display: flex; align-items: center; gap: .75rem; font-size: .88rem; min-width: 260px; animation: toastIn .3s ease; border-left: 4px solid var(--nb-accent); }
    .toast-item.success { border-left-color: var(--nb-success); }
    .toast-item.error { border-left-color: var(--nb-danger); }
    .toast-item.warning { border-left-color: var(--nb-warning); }
    @keyframes toastIn { from { opacity:0; transform: translateX(30px); } to { opacity:1; transform: translateX(0); } }

    /* ===== MISC ===== */
    .progress-bar-custom { height: 6px; border-radius: 3px; background: var(--nb-border); overflow: hidden; }

    .search-bar { border: 1.5px solid var(--nb-border); border-radius: 10px; padding: .5rem 1rem .5rem 2.5rem; background: var(--nb-bg); color: var(--nb-text); font-family: inherit; font-size: .88rem; width: 100%; outline: none; transition: border-color .2s; }
    .search-bar:focus { border-color: var(--nb-accent); }
    .search-wrap { position: relative; }
    .search-wrap i { position: absolute; left: .8rem; top: 50%; transform: translateY(-50%); color: var(--nb-muted); pointer-events: none; }
    .tab-nav { display: flex; gap: .25rem; border-bottom: 2px solid var(--nb-border); margin-bottom: 1.5rem; }

    .tab-btn.active { color: var(--nb-accent); border-bottom-color: var(--nb-accent); font-weight: 600; }
    .empty-state { text-align: center; padding: 3rem; color: var(--nb-muted); }
    .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }
    canvas { max-width: 100%; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; }
    @media (max-width:992px) { .sidebar-overlay.active { display: block; } }
    label { font-size: .85rem; font-weight: 500; margin-bottom: .3rem; display: block; color: var(--nb-muted); }
    select.nb-input option { background: var(--nb-card); }
    .form-group { margin-bottom: 1rem; }
    .admin-section { background: linear-gradient(90deg, #2d1b00, #7c5a1e); border-radius: 10px; padding: .75rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: .75rem; color: #fff; }
    .notification-dot { width: 8px; height: 8px; background: var(--nb-danger); border-radius: 50%; position: absolute; top: 2px; right: 2px; }
    .divider { border: none; border-top: 1px solid var(--nb-border); margin: 1.5rem 0; }
    .chip { display: inline-flex; align-items: center; gap: .3rem; padding: .3rem .7rem; border-radius: 20px; font-size: .75rem; font-weight: 500; background: var(--nb-light-accent); color: var(--nb-accent); }
    .loan-progress { margin: .5rem 0; }
    .topbar-actions { display: flex; align-items: center; gap: .75rem; }
    .icon-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--nb-border); background: var(--nb-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; color: var(--nb-text); transition: all .2s; }
    .icon-btn:hover { border-color: var(--nb-accent); color: var(--nb-accent); }
  </style>
</head>

</div>

let STATE = { user: null, page: 'dashboard' };

function login(email, password) {
  const user = DB.users.getByEmail(email);
  if (!user) return { ok: false, msg: 'User not found' };
  if (user.status === 'frozen') return { ok: false, msg: 'Account is frozen. Contact support.' };
  if (user.failedLogins >= 5) return { ok: false, msg: 'Account locked. Too many failed attempts.' };
  if (user.password !== password) {
    DB.users.update(user.id, { failedLogins: (user.failedLogins||0)+1 });
    return { ok: false, msg: 'Invalid password' };
  }
  DB.users.update(user.id, { failedLogins: 0 });
  STATE.user = user;
  sessionStorage.setItem('nb_session', user.id);
  return { ok: true };
}

function logout() {
  STATE.user = null;
  sessionStorage.removeItem('nb_session');
  location.reload();
}

function isAdmin() { return STATE.user && ['admin','superadmin','teller'].includes(STATE.user.role); }
function isSuperAdmin() { return STATE.user && STATE.user.role === 'superadmin'; }

function restoreSession() {
  const uid = sessionStorage.getItem('nb_session');
  if (uid) { STATE.user = DB.users.getById(uid); return !!STATE.user; }
  return false;
}

function fmt(n) { return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}); }
function uid() { return Math.random().toString(36).substr(2,9); }
function toast(msg, type='info') {
  const icons = {success:'check-circle-fill',error:'x-circle-fill',warning:'exclamation-triangle-fill',info:'info-circle-fill'};
  const colors = {success:'var(--nb-success)',error:'var(--nb-danger)',warning:'var(--nb-warning)',info:'var(--nb-accent)'};
  const el = document.createElement('div');
  el.className = 'toast-item ' + type;
  el.innerHTML = `<i class="bi bi-${icons[type]||'info-circle-fill'}" style="color:${colors[type]||colors.info};font-size:1.1rem;"></i><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function showModal(title, html, footer='') {
  closeModal();
  const el = document.createElement('div');
  el.id = 'active-modal';
  el.className = 'nb-modal-overlay';
  el.innerHTML = `<div class="nb-modal"><div class="nb-modal-header"><div class="nb-modal-title">${title}</div><button class="nb-modal-close" onclick="closeModal()"><i class="bi bi-x"></i></button></div><div id="modal-body">${html}</div>${footer?'<div class="mt-3">'+footer+'</div>':''}</div>`;
  el.addEventListener('click', e => { if(e.target===el) closeModal(); });
  document.getElementById('modal-container').appendChild(el);
}
function closeModal() { const m = document.getElementById('active-modal'); if(m) m.remove(); }
function logAudit(action, entity, entityId, detail='') {
  if (!STATE.user) return;
  DB.auditLog.add({ id:'al'+uid(), adminId:STATE.user.id, action, entity, entityId, detail, ts:new Date().toISOString() });
}

function buildNav() {
  const user = STATE.user;
  let pages = [...PAGES_CUSTOMER];
  if (isAdmin()) pages = [...pages, ...PAGES_ADMIN];
  let html = '';
  let lastSection = '';
  pages.forEach(p => {
    if (p.section !== lastSection) { html += `<div class="nav-section">${p.section}</div>`; lastSection = p.section; }
    html += `<div class="nav-item ${STATE.page===p.id?'active':''}" onclick="navigate('${p.id}')"><i class="bi bi-${p.icon}"></i>${p.label}${p.badge?`<span class="admin-badge">${p.badge}</span>`:''}</div>`;
  });
  document.getElementById('sidebar-nav').innerHTML = html;
}

function navigate(page) {
  STATE.page = page;
  document.getElementById('topbar-title').textContent = [...PAGES_CUSTOMER,...PAGES_ADMIN].find(p=>p.id===page)?.label||page;
  buildNav();
  renderPage(page);
  if (window.innerWidth < 992) toggleSidebar(false);
}

function toggleSidebar(force) {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('sidebar-overlay');
  const open = force !== undefined ? force : !s.classList.contains('open');
  s.classList.toggle('open', open);
  o.classList.toggle('active', open);
}
document.getElementById('sidebar-overlay')?.addEventListener('click', () => toggleSidebar(false));

function updateTopbarUser() {
  const u = STATE.user;
  const initials = u.name.split(' ').map(n=>n[0]).join('').toUpperCase();
  document.getElementById('sidebar-avatar').textContent = initials;
  document.getElementById('topbar-avatar').textContent = initials;

  document.getElementById('sidebar-role').textContent = u.role.charAt(0).toUpperCase()+u.role.slice(1);

function updateNotifDot() {

  document.getElementById('notif-dot').style.display = unread > 0 ? 'block' : 'none';
}

function toggleTheme() {
  const html = document.documentElement;
  const dark = html.dataset.theme === 'dark';
  html.dataset.theme = dark ? 'light' : 'dark';
  document.getElementById('theme-btn').innerHTML = dark ? '<i class="bi bi-moon"></i>' : '<i class="bi bi-sun"></i>';

function doRegister() {
  const fname = document.getElementById('r-fname').value.trim();
  const lname = document.getElementById('r-lname').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass = document.getElementById('r-pass').value;
  const pass2 = document.getElementById('r-pass2').value;
  if (!fname||!lname||!email) return toast('Please fill all fields', 'error');
  if (pass !== pass2) return toast('Passwords do not match', 'error');

let transferMode = 'internal';
function switchTransferTab(btn, mode) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  transferMode = mode;
  document.getElementById('transfer-to-internal').style.display = mode==='internal'?'block':'none';
  document.getElementById('transfer-to-external').style.display = mode==='external'?'block':'none';
  document.getElementById('transfer-to-intl').style.display = mode==='international'?'block':'none';
}
function initiateTransfer() {
  const amount = parseFloat(document.getElementById('t-amount').value);
  const fromId = document.getElementById('t-from').value;
  const desc = document.getElementById('t-desc').value || 'Transfer';
  const currency = document.getElementById('t-currency').value;
  if (!amount || amount <= 0) return toast('Enter a valid amount', 'error');
  const fromAcc = DB.accounts.getById(fromId);
  if (fromAcc.balance < amount) return toast('Insufficient funds', 'error');
  // OTP confirm
  showModal('Confirm Transfer', `
    <div style="text-align:center;padding:1rem 0;">
      <div style="font-size:2rem;font-weight:700;color:var(--nb-accent);">${currency} ${fmt(amount)}</div>
      <div style="color:var(--nb-muted);margin:.5rem 0;">${desc}</div>
      <p style="font-size:.85rem;">Enter your OTP to confirm:</p>
      <input class="nb-input" id="otp-input" placeholder="Enter 6-digit OTP" style="max-width:200px;margin:0 auto;text-align:center;font-size:1.2rem;letter-spacing:4px;" maxlength="6">
      <p style="font-size:.78rem;color:var(--nb-muted);margin-top:.5rem;">Demo OTP: <strong>123456</strong></p>
    </div>`,
    `<div class="d-flex gap-2 justify-content-end"><button class="btn-nb btn-nb-outline" onclick="closeModal()">Cancel</button><button class="btn-nb btn-nb-primary" onclick="confirmTransfer('${fromId}',${amount},'${desc}')"><i class="bi bi-check2"></i> Confirm</button></div>`
  );
}
function confirmTransfer(fromId, amount, desc) {
  const otp = document.getElementById('otp-input').value;
  if (otp !== '123456') return toast('Invalid OTP', 'error');
  const fromAcc = DB.accounts.getById(fromId);
  DB.accounts.update(fromId, { balance: fromAcc.balance - amount });
  let toId = null;
  if (transferMode === 'internal') {
    toId = document.getElementById('t-to-internal')?.value;
    if (toId) { const toAcc = DB.accounts.getById(toId); DB.accounts.update(toId, { balance: toAcc.balance + amount }); }
  }
  DB.transactions.create({ id:'t'+uid(), fromId, toId, amount, type:'transfer', category:'Transfer', desc, status:'completed', ts:new Date().toISOString() });
  DB.notifications.add({ id:'n'+uid(), userId:STATE.user.id, message:`Transfer of ${fmt(amount)} was successful.`, type:'success', read:false, ts:new Date().toISOString() });
  toast('Transfer successful!', 'success');
  closeModal();
  navigate('history');
}

        <div class="col-md-4"><label>Interest Rate (%)</label><input class="nb-input" id="lc-rate" type="number" value="5.5" step="0.1" oninput="calcLoan()"></div>
        <div class="col-md-4"><label>Term (months)</label><input class="nb-input" id="lc-term" type="number" value="24" oninput="calcLoan()"></div>
      </div>

        <div class="col-md-4"><div class="nb-card" style="text-align:center;"><div style="color:var(--nb-muted);font-size:.78rem;">Total Payment</div><div class="mono fw-bold" id="lc-total" style="font-size:1.5rem;"></div></div></div>
        <div class="col-md-4"><div class="nb-card" style="text-align:center;"><div style="color:var(--nb-muted);font-size:.78rem;">Total Interest</div><div class="mono fw-bold" id="lc-interest" style="font-size:1.5rem;color:var(--nb-danger);"></div></div></div>
      </div>

function calcLoan() {
  const p = parseFloat(document.getElementById('lc-amount')?.value)||0;
  const r = (parseFloat(document.getElementById('lc-rate')?.value)||0)/100/12;
  const n = parseInt(document.getElementById('lc-term')?.value)||1;
  const m = r>0 ? p*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1) : p/n;
  const total = m*n;
  if (document.getElementById('lc-monthly')) {
    document.getElementById('lc-monthly').textContent = fmt(m);
    document.getElementById('lc-total').textContent = fmt(total);
    document.getElementById('lc-interest').textContent = fmt(total-p);
  }
}
function applyLoanModal() {
  showModal('Apply for Loan', `
    <div class="form-group"><label>Loan Type</label><select class="nb-input" id="al-type"><option>Personal</option><option>Auto</option><option>Mortgage</option><option>Business</option></select></div>
    <div class="form-group"><label>Amount</label><input class="nb-input" id="al-amount" type="number" placeholder="e.g. 10000"></div>
    <div class="form-group"><label>Preferred Term (months)</label><input class="nb-input" id="al-term" type="number" placeholder="e.g. 24"></div>
    <div class="form-group"><label>Purpose</label><input class="nb-input" id="al-purpose" placeholder="What is this loan for?"></div>`,
    `<div class="d-flex gap-2 justify-content-end"><button class="btn-nb btn-nb-outline" onclick="closeModal()">Cancel</button><button class="btn-nb btn-nb-primary" onclick="submitLoan()">Submit Application</button></div>`
  );
}
function submitLoan() {
  const amount = parseFloat(document.getElementById('al-amount').value);
  const term = parseInt(document.getElementById('al-term').value);
  if (!amount||!term) return toast('Fill in all fields', 'error');
  const rate = 5.5;
  const r = rate/100/12;
  const monthly = r>0 ? amount*(r*Math.pow(1+r,term))/(Math.pow(1+r,term)-1) : amount/term;
  DB.loans.create({ id:'l'+uid(), userId:STATE.user.id, type:document.getElementById('al-type').value, amount, rate, term, paid:0, status:'pending', appliedAt:new Date().toISOString().slice(0,10), nextPayment:'—', monthlyPayment:Math.round(monthly*100)/100 });
  toast('Loan application submitted! Review within 2-3 business days.', 'success');
  closeModal();
  navigate('loans');
}
function earlyRepay(id) {
  const l = DB.loans.getById(id);
  showModal('Early Repayment', `<p>Make a payment towards your ${l.type} Loan (remaining: ${fmt(l.amount-l.paid)})</p><div class="form-group"><label>Payment Amount</label><input class="nb-input" id="ep-amount" type="number" value="${l.monthlyPayment}"></div>`,
    `<div class="d-flex gap-2 justify-content-end"><button class="btn-nb btn-nb-outline" onclick="closeModal()">Cancel</button><button class="btn-nb btn-nb-success" onclick="processPayment('${id}')">Pay Now</button></div>`
  );
}
function processPayment(id) {
  const amount = parseFloat(document.getElementById('ep-amount').value);
  const l = DB.loans.getById(id);
  const newPaid = l.paid + amount;
  DB.loans.update(id, { paid: newPaid, status: newPaid >= l.amount ? 'paid' : 'active' });
  toast('Payment processed!', 'success');
  closeModal();
  navigate('loans');
}

function payBill() {
  const amount = parseFloat(document.getElementById('bill-amount').value);
  if (!amount||amount<=0) return toast('Enter valid amount', 'error');
  const fromId = document.getElementById('bill-from').value;
  const acc = DB.accounts.getById(fromId);
  if (acc.balance < amount) return toast('Insufficient funds','error');
  DB.accounts.update(fromId, {balance:acc.balance-amount});
  DB.transactions.create({id:'t'+uid(),fromId,toId:null,amount,type:'payment',category:document.getElementById('bill-cat').value,desc:document.getElementById('bill-provider').value||'Bill Payment',status:'completed',ts:new Date().toISOString()});
  toast('Bill paid successfully!','success');
  navigate('history');
}
function quickBill(cat) {
  document.getElementById('bill-cat').value = cat;
  document.getElementById('bill-provider').value = cat + ' Provider';
  document.getElementById('bill-amount').focus();
}
function payToPayee(id) {
  const p = DB.payees.getById ? DB.payees.getById(id) : (DB.get('payees')||[]).find(px=>px.id===id);
  if (p) { document.getElementById('bill-provider').value = p.name; }
}

  STATE.user = DB.users.getById(STATE.user.id);
  updateTopbarUser();
  toast('Profile updated!', 'success');
}
function changePassword() {
  const cur = document.getElementById('p-cur-pass').value;
  const nw = document.getElementById('p-new-pass').value;
  const cn = document.getElementById('p-con-pass').value;
  if (cur !== STATE.user.password) return toast('Current password incorrect', 'error');
  if (nw !== cn) return toast('Passwords do not match', 'error');
  if (nw.length < 6) return toast('Password must be 6+ chars', 'error');
  DB.users.update(STATE.user.id, { password: nw });
  STATE.user.password = nw;
  toast('Password updated!', 'success');
}

function doAdjustBalance(id) {
  const a = DB.accounts.getById(id);
  const type = document.getElementById('adj-type').value;
  const amount = parseFloat(document.getElementById('adj-amount').value);
  const reason = document.getElementById('adj-reason').value||'Admin adjustment';
  if (!amount) return toast('Enter amount','error');
  let newBal = a.balance;
  if (type==='credit') newBal += amount;
  else if (type==='debit') newBal -= amount;
  else newBal = amount;
  DB.accounts.update(id, {balance: Math.max(0, newBal)});
  DB.transactions.create({id:'t'+uid(),fromId:type==='debit'?id:null,toId:type==='credit'?id:null,amount,type:'adjustment',category:'Admin',desc:reason,status:'completed',ts:new Date().toISOString()});
  logAudit('ADJUST_BALANCE','account',id,reason);
  toast('Balance adjusted!','success');
  closeModal();
  navigate('admin-accounts');
}

    <div class="nb-card">
      <div style="overflow-x:auto;"><table class="nb-table"><thead><tr><th>Card Number</th><th>Owner</th><th>Type</th><th>Expiry</th><th>Daily Limit</th><th>Status</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>
    </div>`;
}
function adminToggleCard(id) {
  const c = DB.cards.getById(id);
  const ns = c.status==='active'?'frozen':'active';
  DB.cards.update(id,{status:ns});
  logAudit(ns==='frozen'?'FREEZE_CARD':'UNFREEZE_CARD','card',id);
  toast(`Card ${ns}`,'warning');
  navigate('admin-cards');
}
function adminCancelCard(id) {
  if (!confirm('Permanently cancel this card?')) return;
  DB.cards.update(id,{status:'cancelled'});
  logAudit('CANCEL_CARD','card',id);
  toast('Card cancelled','warning');
  navigate('admin-cards');
}
function adminEditCardModal(id) {
  const c = DB.cards.getById(id);
  showModal('Edit Card Limits', `
    <div class="form-group"><label>Daily Limit ($)</label><input class="nb-input" id="ac-daily" type="number" value="${c.dailyLimit}"></div>
    <div class="form-group"><label>Monthly Limit ($)</label><input class="nb-input" id="ac-monthly" type="number" value="${c.monthlyLimit}"></div>
    <div class="form-group"><label>Status</label><select class="nb-input" id="ac-status"><option ${c.status==='active'?'selected':''}>active</option><option ${c.status==='frozen'?'selected':''}>frozen</option><option ${c.status==='cancelled'?'selected':''}>cancelled</option></select></div>`,
    `<div class="d-flex gap-2 justify-content-end"><button class="btn-nb btn-nb-outline" onclick="closeModal()">Cancel</button><button class="btn-nb btn-nb-primary" onclick="adminUpdateCard('${id}')">Save</button></div>`
  );
}
function adminUpdateCard(id) {
  DB.cards.update(id,{dailyLimit:parseFloat(document.getElementById('ac-daily').value),monthlyLimit:parseFloat(document.getElementById('ac-monthly').value),status:document.getElementById('ac-status').value});
  logAudit('UPDATE_CARD','card',id);
  toast('Card updated','success');
  closeModal();
  navigate('admin-cards');
}

function renderAdminReports(el) {
  if (!adminGuard(el)) return;
  const txns = DB.transactions.getAll();
  const users = DB.users.getAll();
  const loans = DB.loans.getAll();
  const totalRevenue = txns.filter(t=>t.category==='Fee'||t.category==='Interest').reduce((s,t)=>s+t.amount,0);
  el.innerHTML = `
    <div class="admin-section mb-3"><i class="bi bi-bar-chart" style="color:var(--nb-gold);"></i><div><strong>Reports & Analytics</strong></div></div>
    <div class="row g-3 mb-4">
      <div class="col-6 col-xl-3"><div class="stat-card"><div class="stat-label">Total Transactions</div><div class="stat-value">${txns.length}</div></div></div>
      <div class="col-6 col-xl-3"><div class="stat-card gold"><div class="stat-label">Total Users</div><div class="stat-value">${users.length}</div></div></div>
      <div class="col-6 col-xl-3"><div class="stat-card green"><div class="stat-label">Active Loans</div><div class="stat-value">${loans.filter(l=>l.status==='active').length}</div></div></div>
      <div class="col-6 col-xl-3"><div class="stat-card red"><div class="stat-label">Pending Reviews</div><div class="stat-value">${loans.filter(l=>l.status==='pending').length}</div></div></div>
    </div>
    <div class="row g-3">
      <div class="col-12 col-lg-8"><div class="nb-card"><h6 class="fw-semibold mb-3">Monthly Transaction Summary</h6><canvas id="monthly-chart" height="150"></canvas></div></div>
      <div class="col-12 col-lg-4"><div class="nb-card"><h6 class="fw-semibold mb-3">Transaction Types</h6><canvas id="type-chart" height="200"></canvas></div></div>
    </div>
    <div class="row g-3 mt-0">
      <div class="col-12"><div class="nb-card">
        <div class="d-flex justify-content-between align-items-center mb-3"><h6 class="fw-semibold mb-0">User Status Distribution</h6><button class="btn-nb btn-nb-outline btn-nb-sm" onclick="exportReport()"><i class="bi bi-download"></i> Export</button></div>
        <div class="row g-3">
          ${['active','frozen','pending'].map(s=>{const count=users.filter(u=>u.status===s).length;const pct=Math.round(count/users.length*100)||0;return `<div class="col-12 col-md-4"><div style="font-size:.85rem;margin-bottom:.3rem;">${s.charAt(0).toUpperCase()+s.slice(1)} Users <strong>${count}</strong> (${pct}%)</div><div class="progress-bar-custom"><div class="progress-fill" style="width:${pct}%;"></div></div></div>`;}).join('')}
        </div>
      </div></div>
    </div>`;
  setTimeout(()=>{
    const months = ['Sep','Oct','Nov','Dec','Jan','Feb'];
    const ctx1 = document.getElementById('monthly-chart');
    if(ctx1) new Chart(ctx1, {type:'line',data:{labels:months,datasets:[{label:'Payments',data:[12,8,15,11,9,txns.filter(t=>t.type==='payment').length],borderColor:'#1d6fa4',fill:true,backgroundColor:'rgba(29,111,164,.1)',tension:.4},{label:'Transfers',data:[5,7,6,9,8,txns.filter(t=>t.type==='transfer').length],borderColor:'#c9a84c',fill:true,backgroundColor:'rgba(201,168,76,.1)',tension:.4}]},options:{plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true}}}});
    const types = {};
    txns.forEach(t=>{types[t.type]=(types[t.type]||0)+1;});
    const ctx2 = document.getElementById('type-chart');
    if(ctx2) new Chart(ctx2, {type:'doughnut',data:{labels:Object.keys(types),datasets:[{data:Object.values(types),backgroundColor:['#1d6fa4','#c9a84c','#12b76a','#f04438'],borderWidth:0}]},options:{plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},cutout:'60%'}});
  },50);
}
function exportReport() {
  const users = DB.users.getAll();
  const csv = ['Name,Email,Role,Status,Joined',...users.map(u=>`${u.name},${u.email},${u.role},${u.status},${u.joined}`)].join('\n');
  const a = document.createElement('a'); a.href='data:text/csv,'+encodeURIComponent(csv); a.download='user-report.csv'; a.click();
}

        </div>
        <div class="nb-card mb-3">

          <div class="form-group"><label>Message</label><textarea class="nb-input" rows="3" placeholder="Type a system-wide announcement..."></textarea></div>
          <div class="form-group"><label>Priority</label><select class="nb-input"><option>Info</option><option>Warning</option><option>Critical</option></select></div>
          <button class="btn-nb btn-nb-primary" onclick="toast('Announcement broadcast to all users!','success')"><i class="bi bi-megaphone"></i> Broadcast</button>

          <button class="btn-nb btn-nb-danger w-100 mb-2 justify-content-center" onclick="toast('Full backup initiated...','info')"><i class="bi bi-cloud-download"></i> Export Full Database</button>
          <button class="btn-nb btn-nb-outline w-100 justify-content-center" onclick="if(confirm('Reset ALL demo data?')){localStorage.removeItem(\'nb_seeded\');DB.seed();toast(\'Data reset\',\'success\');}"><i class="bi bi-arrow-clockwise"></i> Reset Demo Data</button>

function renderAdminAudit(el) {
  if (!adminGuard(el)) return;
  const logs = DB.auditLog.getAll().reverse();
  const rows = logs.map(l=>{
    const admin = DB.users.getById(l.adminId);
    return `<tr>
      <td>${fmtDate(l.ts)}</td>
      <td style="font-size:.8rem;">${new Date(l.ts).toLocaleTimeString()}</td>
      <td><strong>${admin?.name||'?'}</strong></td>
      <td><span class="chip" style="font-size:.72rem;">${l.action}</span></td>
      <td style="font-size:.8rem;">${l.entity} / <span class="mono">${l.entityId}</span></td>
      <td style="font-size:.82rem;">${l.detail||'—'}</td>
    </tr>`;}).join('');
  el.innerHTML = `
    <div class="admin-section mb-3"><i class="bi bi-shield-check" style="color:var(--nb-gold);"></i><div><strong>Audit Log</strong> — All admin actions recorded</div></div>
    <div class="nb-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="search-wrap"><i class="bi bi-search"></i><input class="search-bar" placeholder="Search audit log..." style="width:220px;" oninput="filterTable(this,'audit-tbl')"></div>
        <span style="font-size:.82rem;color:var(--nb-muted);">${logs.length} entries</span>
      </div>
      <div style="overflow-x:auto;"><table class="nb-table" id="audit-tbl">
        <thead><tr><th>Date</th><th>Time</th><th>Admin</th><th>Action</th><th>Target</th><th>Detail</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" class="text-center py-4 text-muted">No audit entries yet</td></tr>'}</tbody>
      </table></div>
    </div>`;
}
